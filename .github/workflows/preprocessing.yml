name: Automated Preprocessing MBG

on:
  push:
    branches: [main]
    paths:
      - 'data_mbg_raw.csv'
      - 'preprocessing/automate_TarunaHeza.py'
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy scikit-learn nltk

      - name: Download NLTK Resources
        run: |
          python -c "
          import nltk
          nltk.download('stopwords')
          nltk.download('punkt')
          nltk.download('punkt_tab')
          "

      - name: Run Preprocessing
        run: |
          python preprocessing/automate_TarunaHeza.py \
            --input data_mbg_raw.csv \
            --output preprocessing/data_mbg_preprocessing

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: data_mbg_preprocessing
          path: preprocessing/data_mbg_preprocessing/

      - name: Commit Preprocessed Dataset
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update preprocessed dataset [skip ci]"
          file_pattern: "preprocessing/data_mbg_preprocessing/*"
